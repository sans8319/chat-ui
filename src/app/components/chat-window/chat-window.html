<div class="chat-viewport">
  <header class="chat-header">
    <div class="user-info">
      <div class="avatar-sm">S</div>
      <div class="details">
        <h3>Sanskriti</h3>
        <span class="status-indicator">
          <span class="dot"></span> Online
        </span>
      </div>
    </div>
  </header>

  <div class="messages-container" (scroll)="onScroll($event)">
    <div *ngFor="let msg of messages" 
         [ngClass]="msg?.sender?.username === currentUser ? 'message-wrapper sent' : 'message-wrapper received'">
      <div class="bubble">
        {{ msg.content }}
      </div>
      <span class="timestamp">12:45 PM</span>
    </div>
  </div>

  <button class="scroll-down-btn" *ngIf="!isUserAtBottom" (click)="scrollToBottom()">
    <span class="badge" *ngIf="newMessagesCount > 0">{{ newMessagesCount }}</span>
    <svg viewBox="0 0 24 24" width="24" height="24">
      <path fill="currentColor" d="M12 16L6 10H18L12 16Z"/>
    </svg>
  </button>

  <app-chat-input></app-chat-input>
</div>
