<div class="input-container">
  <div class="input-wrapper">
    <textarea 
      [(ngModel)]="messageText" 
      (keydown)="onKeyDown($event)"
      placeholder="Type a premium message..."
      rows="1"></textarea>
    
    <button class="send-btn" (click)="sendMessage()" [disabled]="!messageText.trim()">
      Send
    </button>
  </div>
</div>
