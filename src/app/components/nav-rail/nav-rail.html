<div class="nav-rail-container">
  <div class="top-nav-items">
    
    <div class="nav-button" [class.active]="activeTab === 'chats'" (click)="switchTab('chats')">
      <div class="icon-wrapper">
        <img src="/assets/chat.png" class="custom-nav-icon" alt="Chats">
      </div>
      <span class="nav-label">Chats</span>
    </div>

    <div class="nav-button" [class.active]="activeTab === 'groups'" (click)="switchTab('groups')">
      <div class="icon-wrapper">
        <img src="/assets/groupchat.png" class="custom-nav-icon" alt="Groups">
      </div>
      <span class="nav-label">Groups</span>
    </div>

    <div class="nav-button">
      <div class="icon-wrapper">
        <img src="/assets/poll.png" class="custom-nav-icon" alt="Poll">
      </div>
      <span class="nav-label">Polling</span>
    </div>
  </div>
  
  <div class="bottom-nav-items">
    
    <div class="profile-section" [class.active]="activeTab === 'profile'" (click)="switchTab('profile')" style="cursor: pointer;">
      <div class="user-avatar-rail" title="Profile" 
           [style.border]="activeTab === 'profile' ? '2px solid #6366f1' : 'none'"
           [ngClass]="parseProfilePicture(loggedInProfilePicture).bg">
        
        <img *ngIf="parseProfilePicture(loggedInProfilePicture).isImage" [src]="parseProfilePicture(loggedInProfilePicture).url" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
        <span *ngIf="parseProfilePicture(loggedInProfilePicture).isAvatar" style="font-size: 18px;">
          {{ parseProfilePicture(loggedInProfilePicture).icon }}
        </span>
        <ng-container *ngIf="!parseProfilePicture(loggedInProfilePicture).isImage && !parseProfilePicture(loggedInProfilePicture).isAvatar">
          {{ userInitial || '?' }}
        </ng-container>

        <span class="status-dot-rail" [style.backgroundColor]="loggedInStatusColor"></span>
      </div>
    </div>
  </div>
</div>
