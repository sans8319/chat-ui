<div class="sidebar-container">
  <div class="sidebar-header">
    <h2>Messages</h2>
    <button class="new-chat-btn">+</button>
  </div>

  <div class="search-box">
    <input type="text" placeholder="Search conversations..." />
  </div>

  <div class="chat-list">
    <div class="chat-item" 
         *ngFor="let user of users" 
         [class.active]="user.id === activeUserId"
         (click)="selectUser(user)">
      
      <div class="avatar-wrapper">
        <div class="avatar">{{ user.username.charAt(0).toUpperCase() }}</div>
        <div class="online-status" [style.background]="user.online ? '#22c55e' : '#94a3b8'"></div>
      </div>

      <div class="chat-info">
        <div class="name-row">
          <span class="chat-name">{{ user.username }}</span>
          <span class="time" [class.highlight]="user.unreadCount > 0">
            {{ user.lastMessageTime | date:'shortTime' }}
          </span>
        </div>

        <div class="message-row">
          <p class="last-message" [class.unread-text]="user.unreadCount > 0">
            {{ user.lastMessage || 'Click to start chatting... 🚀' }}
          </p>
          
          <div class="unread-badge" *ngIf="user.unreadCount > 0">
            {{ user.unreadCount }}
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="users.length === 0" class="no-users-msg" style="padding: 20px; text-align: center; color: #94a3b8;">
      No users online.
    </div>
  </div>
</div>
